<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goodbye, ZD Design Team 💛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #050508;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    canvas { display: block; }

    /* Vignette overlay */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(5,5,8,0.65) 100%);
      pointer-events: none;
      z-index: 5;
    }

    /* Text overlay */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
      z-index: 10;
      gap: 0;
    }

    .eyebrow {
      font-size: clamp(10px, 1.1vw, 16px);
      font-weight: 400;
      color: rgba(255, 226, 51, 0.0);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      margin-bottom: 14px;
    }

    .title {
      font-size: clamp(72px, 13vw, 200px);
      font-weight: 900;
      color: rgba(255,255,255,0);
      letter-spacing: -0.04em;
      text-transform: uppercase;
      line-height: 0.9;
      animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    .subtitle {
      font-size: clamp(12px, 1.6vw, 22px);
      font-weight: 300;
      color: rgba(255, 226, 51, 0.0);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-top: 22px;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    }

    .divider {
      width: 40px; height: 1px;
      background: rgba(255, 226, 51, 0.4);
      margin-top: 28px;
      opacity: 0;
      animation: fadeIn 1s ease 1.6s forwards;
    }

    .message {
      font-size: clamp(12px, 1vw, 16px);
      font-weight: 300;
      color: rgba(255,255,255,0);
      text-align: center;
      line-height: 2;
      max-width: 500px;
      margin-top: 24px;
      animation: fadeUp 1.2s ease 1.9s forwards;
    }

    .message .accent { color: #FFE233; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Scroll hint */
    #hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 3s forwards;
    }
  </style>
</head>
<body>

  <div id="vignette"></div>

  <div id="overlay">
    <div class="eyebrow">Zocdoc Design</div>
    <div class="title">Goodbye</div>
    <div class="subtitle">With love &amp; gratitude</div>
    <div class="divider"></div>
    <div class="message">
      Thank you for every pixel, every late-night critique,<br />
      every laugh and every breakthrough moment.<br />
      It's been a privilege to design alongside you all.<br />
      <span class="accent">Keep making healthcare beautiful. 💛</span>
    </div>
  </div>

  <div id="hint">Move your mouse &nbsp;·&nbsp; explore the space</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ─────────────────────────────────────────────────────────────────────────
    // RENDERER
    // ─────────────────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    scene.background = new THREE.Color(0x050508);

    const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 300);
    camera.position.set(0, 0, 22);

    // ─────────────────────────────────────────────────────────────────────────
    // LIGHTS
    // ─────────────────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x111111, 1.5));

    const sunLight = new THREE.PointLight(0xFFE233, 6, 50);
    scene.add(sunLight);

    const tealLight = new THREE.PointLight(0x1FC8DB, 2.5, 35);
    tealLight.position.set(-10, 5, -10);
    scene.add(tealLight);

    // ─────────────────────────────────────────────────────────────────────────
    // CENTRAL ORB  (Zocdoc yellow sphere)
    // ─────────────────────────────────────────────────────────────────────────
    const orbGeo = new THREE.SphereGeometry(2.5, 128, 128);
    const orbMat = new THREE.MeshPhysicalMaterial({
      color:             new THREE.Color(0x201400),
      emissive:          new THREE.Color(0xFFE233),
      emissiveIntensity: 1.4,
      roughness:         0.35,
      metalness:         0.05,
    });
    const orb = new THREE.Mesh(orbGeo, orbMat);
    scene.add(orb);

    // Outer glow shell
    const glowGeo = new THREE.SphereGeometry(3.1, 32, 32);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xFFE233, transparent: true, opacity: 0.055, side: THREE.BackSide,
    });
    const glowShell = new THREE.Mesh(glowGeo, glowMat);
    scene.add(glowShell);

    // ─────────────────────────────────────────────────────────────────────────
    // ORBITAL RINGS
    // ─────────────────────────────────────────────────────────────────────────
    function addRing(r, tube, color, opacity, rx, ry, rz) {
      const m = new THREE.Mesh(
        new THREE.TorusGeometry(r, tube, 8, 240),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity })
      );
      m.rotation.set(rx, ry, rz);
      scene.add(m);
      return m;
    }

    const ringTeal   = addRing(5.0, 0.045, 0x1FC8DB, 0.85,  Math.PI / 3.2,  0,            0);
    const ringCoral  = addRing(3.9, 0.030, 0xF27B5A, 0.65, -Math.PI / 4,    Math.PI / 8,  Math.PI / 6);
    const ringYellow = addRing(6.8, 0.018, 0xFFE233, 0.28,  Math.PI / 2,    0,            0);
    const ringWhite  = addRing(4.5, 0.015, 0xffffff, 0.18,  Math.PI / 6,   -Math.PI / 5,  0);

    // ─────────────────────────────────────────────────────────────────────────
    // PARTICLE SYSTEM  (GPU-driven ShaderMaterial)
    // ─────────────────────────────────────────────────────────────────────────
    const N = 8000;
    const pPos    = new Float32Array(N * 3);
    const pColor  = new Float32Array(N * 3);
    const pPhase  = new Float32Array(N);
    const pRadius = new Float32Array(N);

    // Brand color palette with weights
    const palette = [
      { c: [1.00, 0.886, 0.137], w: 0.52 }, // #FFE233 yellow
      { c: [0.12, 0.784, 0.859], w: 0.20 }, // #1FC8DB teal
      { c: [0.95, 0.482, 0.353], w: 0.13 }, // coral
      { c: [0.26, 0.498, 0.957], w: 0.09 }, // blue
      { c: [1.00, 1.000, 1.000], w: 0.06 }, // white
    ];

    function samplePalette() {
      const r = Math.random();
      let s = 0;
      for (const p of palette) { s += p.w; if (r < s) return p.c; }
      return palette[0].c;
    }

    for (let i = 0; i < N; i++) {
      const i3    = i * 3;
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      const r     = 3.5 + Math.pow(Math.random(), 0.55) * 14;

      pPos[i3]     = r * Math.sin(phi) * Math.cos(theta);
      pPos[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      pPos[i3 + 2] = r * Math.cos(phi);
      pPhase[i]    = Math.random() * Math.PI * 2;
      pRadius[i]   = r;

      const c = samplePalette();
      pColor[i3] = c[0]; pColor[i3+1] = c[1]; pColor[i3+2] = c[2];
    }

    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,    3));
    pGeo.setAttribute('aColor',   new THREE.BufferAttribute(pColor,  3));
    pGeo.setAttribute('aPhase',   new THREE.BufferAttribute(pPhase,  1));
    pGeo.setAttribute('aRadius',  new THREE.BufferAttribute(pRadius, 1));

    const pMat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: /* glsl */`
        uniform float uTime;
        attribute vec3  aColor;
        attribute float aPhase;
        attribute float aRadius;
        varying vec3  vColor;
        varying float vAlpha;

        void main() {
          vColor = aColor;
          float spd = 0.22 / (aRadius * 0.28 + 1.0);
          vec3 d = position + vec3(
            sin(uTime * spd        + aPhase       ) * 0.50,
            cos(uTime * spd * 1.27 + aPhase + 0.7 ) * 0.50,
            sin(uTime * spd * 0.73 + aPhase + 2.1 ) * 0.50
          );
          vec4 mvPos = modelViewMatrix * vec4(d, 1.0);
          gl_Position  = projectionMatrix * mvPos;
          gl_PointSize = clamp(90.0 / -mvPos.z, 1.0, 7.0);
          vAlpha = 0.55 + 0.45 * sin(uTime * 0.6 + aPhase);
        }
      `,
      fragmentShader: /* glsl */`
        varying vec3  vColor;
        varying float vAlpha;

        void main() {
          vec2  uv = gl_PointCoord - 0.5;
          float d  = length(uv);
          if (d > 0.5) discard;
          float a = (1.0 - smoothstep(0.15, 0.5, d)) * vAlpha;
          gl_FragColor = vec4(vColor, a);
        }
      `,
      transparent: true,
      blending:    THREE.AdditiveBlending,
      depthWrite:  false,
    });

    scene.add(new THREE.Points(pGeo, pMat));

    // ─────────────────────────────────────────────────────────────────────────
    // STARFIELD
    // ─────────────────────────────────────────────────────────────────────────
    const starPos = new Float32Array(2000 * 3);
    for (let i = 0; i < starPos.length; i++) starPos[i] = (Math.random() - 0.5) * 260;
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
      size: 0.10, color: 0xffffff, transparent: true, opacity: 0.45,
    })));

    // ─────────────────────────────────────────────────────────────────────────
    // FLOATING SATELLITE DOTS
    // ─────────────────────────────────────────────────────────────────────────
    const satDefs = [
      { pos: [ 5.5,  1.5,  0.5], color: 0xFFE233, r: 0.18 },
      { pos: [-4.5,  2.0, -1.0], color: 0x1FC8DB, r: 0.13 },
      { pos: [ 2.5, -4.0,  2.0], color: 0xF27B5A, r: 0.15 },
      { pos: [-3.0, -2.5, -2.5], color: 0xFFE233, r: 0.10 },
      { pos: [ 0.5,  5.0, -1.5], color: 0x1FC8DB, r: 0.12 },
      { pos: [-5.0, -0.5,  3.0], color: 0xFFE233, r: 0.09 },
    ];
    const sats = satDefs.map(({ pos, color, r }) => {
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(r, 16, 16),
        new THREE.MeshBasicMaterial({ color })
      );
      m.position.set(...pos);
      m.userData.origin = new THREE.Vector3(...pos);
      m.userData.phase  = Math.random() * Math.PI * 2;
      scene.add(m);
      return m;
    });

    // ─────────────────────────────────────────────────────────────────────────
    // IMAGE CARDS
    // ─────────────────────────────────────────────────────────────────────────
    const loader   = new THREE.TextureLoader();
    const cardDefs = [
      { src: 'assets/Logo and Wordmark.png', w: 3.8, h: 1.85, x:  8.0,  y:  2.8, z: -0.5 },
      { src: 'assets/PeopleZD.png',          w: 3.2, h: 3.20, x: -7.0,  y: -0.8, z:  2.0 },
      { src: 'assets/DoctorHandWave.png',    w: 3.0, h: 3.00, x:  4.0,  y: -4.0, z: -3.5 },
    ];
    const cardGroups = [];

    cardDefs.forEach((def, idx) => {
      loader.load(
        def.src,
        (tex) => {
          tex.colorSpace = THREE.SRGBColorSpace;
          const group = new THREE.Group();

          // Glow border (slightly larger, yellow)
          group.add(Object.assign(
            new THREE.Mesh(
              new THREE.PlaneGeometry(def.w + 0.20, def.h + 0.20),
              new THREE.MeshBasicMaterial({ color: 0xFFE233, transparent: true, opacity: 0.22 })
            ),
            { position: new THREE.Vector3(0, 0, -0.02) }
          ));

          // Image plane
          const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(def.w, def.h),
            new THREE.MeshBasicMaterial({ map: tex, transparent: true })
          );
          group.add(plane);

          group.position.set(def.x, def.y, def.z);
          group.userData.baseY  = def.y;
          group.userData.phase  = idx * 2.09;
          scene.add(group);
          cardGroups.push(group);
        },
        undefined,
        () => { /* silently skip if images can't load locally */ }
      );
    });

    // ─────────────────────────────────────────────────────────────────────────
    // BLOOM POST-PROCESSING
    // ─────────────────────────────────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(
      new THREE.Vector2(innerWidth, innerHeight),
      1.1,   // strength
      0.55,  // radius
      0.12   // threshold
    );
    composer.addPass(bloom);

    // ─────────────────────────────────────────────────────────────────────────
    // MOUSE TRACKING
    // ─────────────────────────────────────────────────────────────────────────
    let targetMX = 0, targetMY = 0, mx = 0, my = 0;
    window.addEventListener('mousemove', (e) => {
      targetMX = (e.clientX / innerWidth  - 0.5) * 2;
      targetMY = (e.clientY / innerHeight - 0.5) * 2;
    });

    // ─────────────────────────────────────────────────────────────────────────
    // ANIMATION LOOP
    // ─────────────────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function tick() {
      requestAnimationFrame(tick);
      const t = clock.getElapsedTime();

      // Smooth mouse
      mx += (targetMX - mx) * 0.04;
      my += (targetMY - my) * 0.04;

      // Particles shader
      pMat.uniforms.uTime.value = t;

      // Orb pulse + spin
      const pulse = 1 + Math.sin(t * 1.05) * 0.045;
      orb.scale.setScalar(pulse);
      orb.rotation.y = t * 0.11;
      orb.rotation.z = t * 0.04;
      glowShell.scale.setScalar(pulse * (1 + Math.sin(t * 0.5) * 0.06));
      sunLight.intensity = 5.5 + Math.sin(t * 1.05) * 1.2;

      // Rings
      ringTeal.rotation.z   =  t * 0.17;
      ringCoral.rotation.z  = -t * 0.11;
      ringCoral.rotation.y  =  t * 0.07;
      ringYellow.rotation.y =  t * 0.05;
      ringWhite.rotation.x  =  t * 0.09;

      // Satellite dots orbit
      sats.forEach((s, i) => {
        const ph = s.userData.phase + t * 0.4;
        s.position.x = s.userData.origin.x + Math.sin(ph) * 0.4;
        s.position.y = s.userData.origin.y + Math.cos(ph * 0.7) * 0.3;
        s.position.z = s.userData.origin.z + Math.sin(ph * 0.5 + 1) * 0.4;
      });

      // Camera: slow drift + mouse parallax
      const tCamX = Math.sin(t * 0.055) * 3.5 + mx * 2.5;
      const tCamY = Math.sin(t * 0.038) * 2.0 - my * 1.8;
      camera.position.x += (tCamX - camera.position.x) * 0.022;
      camera.position.y += (tCamY - camera.position.y) * 0.022;
      camera.lookAt(0, 0, 0);

      // Image cards: float + face camera
      cardGroups.forEach((g) => {
        g.position.y = g.userData.baseY + Math.sin(t * 0.45 + g.userData.phase) * 0.28;
        g.lookAt(camera.position);
      });

      composer.render();
    }

    tick();

    // ─────────────────────────────────────────────────────────────────────────
    // RESIZE
    // ─────────────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
      bloom.resolution.set(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
