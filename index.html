<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goodbye, ZD Design Team 💛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      /* Warm cream → white → soft sky */
      background: radial-gradient(ellipse at 50% 30%, #fff9d6 0%, #ffffff 55%, #e8f5ff 100%);
      font-family: 'Fredoka', sans-serif;
    }

    /* Three.js canvas sits behind everything */
    canvas {
      position: fixed;
      inset: 0;
      display: block;
      z-index: 1;
    }

    /* ── Decorative images ─────────────────────────────────── */
    .deco {
      position: fixed;
      z-index: 2;
      pointer-events: none;
    }

    #img-hand {
      bottom: -12px;
      right: -16px;
      width: clamp(160px, 22vw, 310px);
      transform-origin: 65% 90%;
      opacity: 0;
      animation:
        slideFromRight 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 1.0s forwards,
        handWave       1.4s ease-in-out                        2.0s infinite;
    }

    #img-people {
      bottom: -18px;
      left:   -18px;
      width: clamp(140px, 18vw, 270px);
      opacity: 0;
      animation: slideFromLeft 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 1.2s forwards;
    }

    /* ── Text overlay ──────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 9vh;
      pointer-events: none;
      z-index: 10;
      gap: 6px;
    }

    .title {
      font-size: clamp(68px, 14vw, 210px);
      font-weight: 700;
      color: #2d2d2d;
      letter-spacing: -0.02em;
      line-height: 1;
      opacity: 0;
      transform: scale(0.75) translateY(30px);
      animation: popIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
    }

    .subtitle {
      font-size: clamp(15px, 2.4vw, 30px);
      font-weight: 600;
      color: #e6a800;
      letter-spacing: 0.06em;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.75s forwards;
    }

    .message {
      font-size: clamp(13px, 1.2vw, 17px);
      font-weight: 400;
      color: rgba(45, 45, 45, 0.55);
      text-align: center;
      line-height: 1.9;
      max-width: 520px;
      margin-top: 4px;
      opacity: 0;
      animation: fadeUp 0.6s ease 1.3s forwards;
    }

    /* ── Keyframes ─────────────────────────────────────────── */
    @keyframes popIn {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideFromRight {
      from { opacity: 0; transform: translateX(50px) rotate(12deg); }
      to   { opacity: 1; transform: translateX(0)    rotate(0deg);  }
    }
    @keyframes slideFromLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes handWave {
      0%,100% { transform: rotate(0deg); }
      20%     { transform: rotate(-14deg); }
      50%     { transform: rotate(10deg); }
      80%     { transform: rotate(-14deg); }
    }
  </style>
</head>
<body>

  <!-- ── Decorative corner illustrations ─────────────────── -->
  <img id="img-hand"   class="deco" src="assets/DoctorHandWave.png" alt="" />
  <img id="img-people" class="deco" src="assets/PeopleZD.png"       alt="" />

  <!-- ── Text overlay ─────────────────────────────────────── -->
  <div id="overlay">
    <div class="title">Goodbye! 👋</div>
    <div class="subtitle">Zocdoc Design Team</div>
    <div class="message">
      Thanks for all the pixels, the late-night crits, the Figma files,<br />
      and every single laugh along the way. You're the best. 💛
    </div>
  </div>

  <!-- ── Three.js ─────────────────────────────────────────── -->
  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE      from 'three';
    import { FontLoader }  from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

    // ─────────────────────────────────────────────────────────────────────────
    // RENDERER  (transparent canvas — CSS handles the background gradient)
    // ─────────────────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.setClearAlpha(0);
    document.body.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 0, 15);

    // ─────────────────────────────────────────────────────────────────────────
    // LIGHTS
    // ─────────────────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 2.2));

    const sun = new THREE.DirectionalLight(0xfffbe0, 3.5);
    sun.position.set(6, 10, 8);
    scene.add(sun);

    const fill = new THREE.PointLight(0x1FC8DB, 2.0, 40);
    fill.position.set(-8, 2, 5);
    scene.add(fill);

    // ─────────────────────────────────────────────────────────────────────────
    // Z ORB CHARACTER
    // The sphere body is one group (can spin freely).
    // The face elements are a second group always facing the camera.
    // ─────────────────────────────────────────────────────────────────────────
    const orbBody  = new THREE.Group();
    const faceGroup = new THREE.Group();
    scene.add(orbBody);
    scene.add(faceGroup);

    // Yellow sphere
    const sphereMat = new THREE.MeshPhongMaterial({
      color:    0xFFE233,
      shininess: 55,
      specular:  new THREE.Color(0xffffff),
    });
    orbBody.add(new THREE.Mesh(new THREE.SphereGeometry(2.2, 64, 64), sphereMat));

    // Soft ground shadow (a blurred-looking dark ellipse)
    const shadowMesh = new THREE.Mesh(
      new THREE.CircleGeometry(1.8, 40),
      new THREE.MeshBasicMaterial({ color: 0x2d2d2d, transparent: true, opacity: 0.09 })
    );
    shadowMesh.rotation.x = -Math.PI / 2;
    shadowMesh.position.y = -2.9;
    scene.add(shadowMesh);

    // Face elements (always face camera) — positioned at z=2.15 in face-local space
    const darkMat = new THREE.MeshPhongMaterial({ color: 0x2d2d2d, shininess: 10 });

    // Left dot  ·
    const dotL = new THREE.Mesh(new THREE.SphereGeometry(0.17, 16, 16), darkMat);
    dotL.position.set(-0.72, 0.08, 2.15);
    faceGroup.add(dotL);

    // Right dot  ·
    const dotR = dotL.clone();
    dotR.position.set(0.72, 0.08, 2.15);
    faceGroup.add(dotR);

    // Smile arc
    const smileGeo = new THREE.TorusGeometry(0.52, 0.10, 8, 40, Math.PI);
    const smile = new THREE.Mesh(smileGeo, darkMat.clone());
    smile.position.set(0, -0.28, 2.12);
    smile.rotation.z = Math.PI; // open side down = smile
    faceGroup.add(smile);

    // Z letter (loaded async, added to faceGroup when ready)
    new FontLoader().load(
      'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/fonts/helvetiker_bold.typeface.json',
      (font) => {
        const zGeo = new TextGeometry('Z', {
          font, size: 1.05, depth: 0.22, curveSegments: 12,
          bevelEnabled: true, bevelThickness: 0.03, bevelSize: 0.025, bevelSegments: 4,
        });
        zGeo.center();
        const zMesh = new THREE.Mesh(zGeo, new THREE.MeshPhongMaterial({
          color: 0x2d2d2d, shininess: 20,
        }));
        zMesh.position.set(0, 0.06, 2.0);
        faceGroup.add(zMesh);
      }
    );

    // ─────────────────────────────────────────────────────────────────────────
    // CONFETTI
    // ─────────────────────────────────────────────────────────────────────────
    const CONF_COLORS = [0xFFE233, 0x1FC8DB, 0xF27B5A, 0x4A7CF7, 0xFF87B2, 0x7EE8A2, 0xffffff];
    const confetti = [];

    for (let i = 0; i < 160; i++) {
      const circle = Math.random() < 0.3;
      const geo = circle
        ? new THREE.CircleGeometry(0.07 + Math.random() * 0.05, 8)
        : new THREE.PlaneGeometry(0.16 + Math.random() * 0.08, 0.07 + Math.random() * 0.04);
      const mat  = new THREE.MeshBasicMaterial({
        color: CONF_COLORS[Math.floor(Math.random() * CONF_COLORS.length)],
        side:  THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(geo, mat);

      mesh.position.set(
        (Math.random() - 0.5) * 28,
        10 + Math.random() * 14,
        (Math.random() - 0.5) * 6
      );
      mesh.rotation.set(
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2
      );
      mesh.userData = {
        vy:       0.028 + Math.random() * 0.042,
        swayF:    0.6   + Math.random() * 1.6,
        swayA:    0.007 + Math.random() * 0.013,
        rx:       (Math.random() - 0.5) * 0.05,
        rz:       (Math.random() - 0.5) * 0.07,
        phase:    Math.random() * Math.PI * 2,
      };
      scene.add(mesh);
      confetti.push(mesh);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // FLOATING HEARTS
    // ─────────────────────────────────────────────────────────────────────────
    function heartMesh(size, color) {
      const s = size;
      const shape = new THREE.Shape();
      shape.moveTo(0, s * 0.5);
      shape.bezierCurveTo( s,   s * 1.7,  s * 2,  s * 0.7,  s * 2,   0);
      shape.bezierCurveTo( s * 2, -s,     s,      -s * 1.3,  0,      -s * 2);
      shape.bezierCurveTo(-s,    -s * 1.3,-s * 2, -s,       -s * 2,   0);
      shape.bezierCurveTo(-s * 2,  s * 0.7,-s,    s * 1.7,   0,       s * 0.5);
      return new THREE.Mesh(
        new THREE.ShapeGeometry(shape),
        new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide })
      );
    }

    const HEART_COLORS = [0xFF87B2, 0xFFE233, 0xF27B5A, 0x1FC8DB];
    const hearts = [];
    for (let i = 0; i < 14; i++) {
      const h = heartMesh(0.06 + Math.random() * 0.08, HEART_COLORS[i % HEART_COLORS.length]);
      h.position.set((Math.random() - 0.5) * 20, -9 + Math.random() * 5, (Math.random() - 0.5) * 5);
      h.userData = {
        vy:    0.012 + Math.random() * 0.022,
        swayF: 0.4   + Math.random() * 0.8,
        phase: Math.random() * Math.PI * 2,
      };
      scene.add(h);
      hearts.push(h);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // SMALL STAR SPARKLES
    // ─────────────────────────────────────────────────────────────────────────
    function starShape(r, points = 5) {
      const shape = new THREE.Shape();
      for (let i = 0; i < points * 2; i++) {
        const angle  = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
        const radius = i % 2 === 0 ? r : r * 0.42;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        i === 0 ? shape.moveTo(x, y) : shape.lineTo(x, y);
      }
      shape.closePath();
      return shape;
    }

    const sparkles = [];
    const SPARKLE_COLORS = [0xFFE233, 0xffffff, 0xFF87B2, 0x1FC8DB];
    for (let i = 0; i < 18; i++) {
      const r = 0.05 + Math.random() * 0.09;
      const m = new THREE.Mesh(
        new THREE.ShapeGeometry(starShape(r)),
        new THREE.MeshBasicMaterial({ color: SPARKLE_COLORS[i % SPARKLE_COLORS.length], side: THREE.DoubleSide })
      );
      m.position.set((Math.random() - 0.5) * 22, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 5);
      m.userData = { phase: Math.random() * Math.PI * 2, speed: 0.6 + Math.random() * 1.2 };
      scene.add(m);
      sparkles.push(m);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // MOUSE
    // ─────────────────────────────────────────────────────────────────────────
    let tmx = 0, tmy = 0, mx = 0, my = 0;
    window.addEventListener('mousemove', (e) => {
      tmx = (e.clientX / innerWidth  - 0.5) * 2;
      tmy = (e.clientY / innerHeight - 0.5) * 2;
    });

    // ─────────────────────────────────────────────────────────────────────────
    // ANIMATION LOOP
    // ─────────────────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function tick() {
      requestAnimationFrame(tick);
      const t = clock.getElapsedTime();

      // Smooth mouse
      mx += (tmx - mx) * 0.05;
      my += (tmy - my) * 0.05;

      // ── Orb ───────────────────────────────────────────────
      // Gentle float + subtle tilt, sphere body spins slowly
      const floatY  = Math.sin(t * 1.25) * 0.55;
      orbBody.position.y  = floatY + 0.4;
      faceGroup.position.y = floatY + 0.4;

      orbBody.rotation.y = t * 0.22;           // slow spin
      const tiltZ = Math.sin(t * 0.75) * 0.12;
      orbBody.rotation.z  = tiltZ;

      // Squash & stretch
      const stretch = 1 + Math.sin(t * 1.25) * 0.045;
      const squash  = 1 / stretch;
      orbBody.scale.set(squash, stretch, squash);

      // Face always looks at camera
      faceGroup.quaternion.copy(camera.quaternion);

      // Shadow follows orb, gets smaller/fainter when orb is high
      shadowMesh.scale.setScalar(1 - floatY * 0.08);
      shadowMesh.material.opacity = 0.09 - floatY * 0.015;

      // ── Confetti ──────────────────────────────────────────
      confetti.forEach((c) => {
        c.position.y -= c.userData.vy;
        c.position.x += Math.sin(t * c.userData.swayF + c.userData.phase) * c.userData.swayA;
        c.rotation.x += c.userData.rx;
        c.rotation.z += c.userData.rz;
        if (c.position.y < -11) {
          c.position.y = 14 + Math.random() * 4;
          c.position.x = (Math.random() - 0.5) * 28;
        }
      });

      // ── Hearts ────────────────────────────────────────────
      hearts.forEach((h) => {
        h.position.y += h.userData.vy;
        h.position.x += Math.sin(t * h.userData.swayF + h.userData.phase) * 0.005;
        h.rotation.z  = Math.sin(t * 0.9 + h.userData.phase) * 0.18;
        const scale   = 0.85 + Math.sin(t * 1.8 + h.userData.phase) * 0.15;
        h.scale.setScalar(scale);
        if (h.position.y > 11) {
          h.position.y = -10 + Math.random() * 2;
          h.position.x = (Math.random() - 0.5) * 20;
        }
      });

      // ── Sparkles twinkle ─────────────────────────────────
      sparkles.forEach((s) => {
        const sc = 0.5 + 0.5 * Math.abs(Math.sin(t * s.userData.speed + s.userData.phase));
        s.scale.setScalar(sc);
        s.rotation.z = t * s.userData.speed * 0.5;
      });

      // ── Camera parallax ───────────────────────────────────
      camera.position.x += (mx * 1.0 - camera.position.x) * 0.03;
      camera.position.y += (-my * 0.6 + 0.3 - camera.position.y) * 0.03;
      camera.lookAt(0, 0.2, 0);

      renderer.render(scene, camera);
    }

    tick();

    // ─────────────────────────────────────────────────────────────────────────
    // RESIZE
    // ─────────────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
