<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goodbye 💛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #FFF9D6;
      font-family: 'Fredoka', sans-serif;
    }

    canvas { display: block; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 8vh;
      pointer-events: none;
      z-index: 10;
    }

    .message {
      font-size: clamp(13px, 1.15vw, 17px);
      font-weight: 400;
      color: rgba(45, 45, 45, 0.55);
      text-align: center;
      line-height: 1.9;
      max-width: 500px;
      opacity: 0;
      animation: fadeUp 0.8s ease 2.8s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="overlay">
    <div class="message">
      It's been such a joy to work with and grow alongside you all.<br />
      I can't wait to see what Zocdoc becomes — you're going to make<br />
      it something truly special. 💛
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE        from 'three';
    import { FontLoader }    from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry }  from 'three/addons/geometries/TextGeometry.js';

    // ── Renderer ──────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    scene.background = new THREE.Color(0xFFF9D6); // warm cream

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 0, 20);

    // ── Lights ────────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 1.6));

    const keyLight = new THREE.DirectionalLight(0xffffff, 3.5);
    keyLight.position.set(3, 8, 12);
    scene.add(keyLight);

    const warmLight = new THREE.PointLight(0xFFD060, 5, 60);
    warmLight.position.set(-4, 4, 10);
    scene.add(warmLight);

    const rimLight = new THREE.DirectionalLight(0xFFB800, 1.8);
    rimLight.position.set(-5, -2, -8);
    scene.add(rimLight);

    // ── Word group (letters go in here so the whole word can rock together) ───
    const wordGroup = new THREE.Group();
    scene.add(wordGroup);
    const letterMeshes = [];

    // Materials — yellow front/back, dark charcoal sides & bevel (Zocdoc style)
    const frontMat = new THREE.MeshPhongMaterial({
      color:    0xFFE233,
      shininess: 110,
      specular:  new THREE.Color(0xffffff),
    });
    const sideMat = new THREE.MeshPhongMaterial({
      color:    0x2d2d2d,
      shininess: 40,
    });

    // ── Load font → build 3D letters ─────────────────────────────────────────
    new FontLoader().load(
      'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/fonts/helvetiker_bold.typeface.json',
      (font) => {
        const TEXT  = 'Goodbye';
        const SIZE  = 2.2;    // letter height
        const DEPTH = 0.55;   // extrusion depth
        const GAP   = 0.22;   // extra spacing between letters

        // Measure every character first so we can centre the whole word
        const infos = TEXT.split('').map((char) => {
          const geo = new TextGeometry(char, {
            font, size: SIZE, height: DEPTH, curveSegments: 12,
            bevelEnabled: true, bevelThickness: 0.09, bevelSize: 0.06, bevelSegments: 5,
          });
          geo.computeBoundingBox();
          const bb = geo.boundingBox;
          return {
            geo,
            w:  bb.max.x - bb.min.x,
            ox: -bb.min.x,
            oy: -(bb.min.y + (bb.max.y - bb.min.y) / 2),
          };
        });

        const totalW = infos.reduce((s, { w }) => s + w, 0) + GAP * (TEXT.length - 1);
        let x = -totalW / 2;

        infos.forEach(({ geo, w, ox, oy }, i) => {
          const mesh = new THREE.Mesh(geo, [frontMat, sideMat]);

          // Start high above the viewport, slightly rotated
          mesh.position.set(x + ox, oy + 20, 0);
          mesh.rotation.z = (i % 2 === 0 ? 1 : -1) * 0.38;

          mesh.userData = {
            baseY: oy,
            vy:    0,           // vertical velocity for spring
            vr:    0,           // rotational velocity for spring
            phase: i * 0.55,   // wave offset
            delay: 0.05 + i * 0.12, // stagger start time
          };

          wordGroup.add(mesh);
          letterMeshes.push(mesh);
          x += w + GAP;
        });
      }
    );

    // ── Confetti ──────────────────────────────────────────────────────────────
    const CONF_COLORS = [0xFFE233, 0x1FC8DB, 0xF27B5A, 0x4A7CF7, 0xFF87B2, 0x7EE8A2, 0xffffff];
    const confetti = [];

    for (let i = 0; i < 150; i++) {
      const geo = Math.random() < 0.3
        ? new THREE.CircleGeometry(0.07 + Math.random() * 0.05, 8)
        : new THREE.PlaneGeometry(0.14 + Math.random() * 0.08, 0.07 + Math.random() * 0.04);
      const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
        color: CONF_COLORS[Math.floor(Math.random() * CONF_COLORS.length)],
        side:  THREE.DoubleSide,
      }));
      mesh.position.set(
        (Math.random() - 0.5) * 32,
        10 + Math.random() * 16,
        (Math.random() - 0.5) * 10
      );
      mesh.rotation.set(
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2
      );
      mesh.userData = {
        vy:    0.025 + Math.random() * 0.042,
        swayF: 0.5   + Math.random() * 1.5,
        swayA: 0.007 + Math.random() * 0.012,
        rx:    (Math.random() - 0.5) * 0.05,
        rz:    (Math.random() - 0.5) * 0.07,
        phase: Math.random() * Math.PI * 2,
      };
      scene.add(mesh);
      confetti.push(mesh);
    }

    // ── Floating hearts ───────────────────────────────────────────────────────
    function heartMesh(size, color) {
      const s = size;
      const shape = new THREE.Shape();
      shape.moveTo(0, s * 0.5);
      shape.bezierCurveTo( s,    s * 1.7,  s * 2,  s * 0.7,  s * 2,  0);
      shape.bezierCurveTo( s * 2, -s,      s,     -s * 1.3,  0,     -s * 2);
      shape.bezierCurveTo(-s,   -s * 1.3, -s * 2, -s,       -s * 2,  0);
      shape.bezierCurveTo(-s * 2, s * 0.7, -s,    s * 1.7,   0,      s * 0.5);
      return new THREE.Mesh(
        new THREE.ShapeGeometry(shape),
        new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide })
      );
    }

    const HEART_COLORS = [0xFF87B2, 0xFFE233, 0xF27B5A, 0x1FC8DB];
    const hearts = [];
    for (let i = 0; i < 14; i++) {
      const h = heartMesh(0.06 + Math.random() * 0.09, HEART_COLORS[i % 4]);
      h.position.set((Math.random() - 0.5) * 24, -12 + Math.random() * 6, (Math.random() - 0.5) * 6);
      h.userData = {
        vy:    0.012 + Math.random() * 0.022,
        swayF: 0.4   + Math.random() * 0.8,
        phase: Math.random() * Math.PI * 2,
      };
      scene.add(h);
      hearts.push(h);
    }

    // ── Star sparkles ─────────────────────────────────────────────────────────
    function makeStarShape(r) {
      const s = new THREE.Shape();
      for (let i = 0; i < 10; i++) {
        const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
        const d = i % 2 === 0 ? r : r * 0.42;
        i === 0
          ? s.moveTo(Math.cos(a) * d, Math.sin(a) * d)
          : s.lineTo(Math.cos(a) * d, Math.sin(a) * d);
      }
      s.closePath();
      return s;
    }

    const SPARKLE_COLORS = [0xFFE233, 0xffffff, 0xFF87B2, 0x1FC8DB];
    const sparkles = [];
    for (let i = 0; i < 20; i++) {
      const m = new THREE.Mesh(
        new THREE.ShapeGeometry(makeStarShape(0.06 + Math.random() * 0.10)),
        new THREE.MeshBasicMaterial({ color: SPARKLE_COLORS[i % 4], side: THREE.DoubleSide })
      );
      m.position.set(
        (Math.random() - 0.5) * 28,
        (Math.random() - 0.5) * 12,
        (Math.random() - 0.5) * 8
      );
      m.userData = { phase: Math.random() * Math.PI * 2, speed: 0.6 + Math.random() * 1.3 };
      scene.add(m);
      sparkles.push(m);
    }

    // ── Mouse ─────────────────────────────────────────────────────────────────
    let tmx = 0, tmy = 0, mx = 0, my = 0;
    window.addEventListener('mousemove', (e) => {
      tmx = (e.clientX / innerWidth  - 0.5) * 2;
      tmy = (e.clientY / innerHeight - 0.5) * 2;
    });

    // ── Animation loop ────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function tick() {
      requestAnimationFrame(tick);
      const t = clock.getElapsedTime();

      mx += (tmx - mx) * 0.04;
      my += (tmy - my) * 0.04;

      // Letters: cascade drop with spring bounce, then gentle wave
      letterMeshes.forEach((m) => {
        if (t < m.userData.delay) return;

        // Spring target = base position + slow sine wave
        const waveY = m.userData.baseY + Math.sin(t * 1.4 + m.userData.phase) * 0.22;
        m.userData.vy = m.userData.vy * 0.76 + (waveY - m.position.y) * 0.14;
        m.position.y += m.userData.vy;

        // Rotation springs back to upright
        m.userData.vr = m.userData.vr * 0.80 - m.rotation.z * 0.10;
        m.rotation.z += m.userData.vr;
      });

      // Whole word gently rocks — shows off the 3D depth
      wordGroup.rotation.y = Math.sin(t * 0.38) * 0.13 + mx * 0.22;
      wordGroup.rotation.x = Math.sin(t * 0.28) * 0.04 - my * 0.06;

      // Confetti
      confetti.forEach((c) => {
        c.position.y -= c.userData.vy;
        c.position.x += Math.sin(t * c.userData.swayF + c.userData.phase) * c.userData.swayA;
        c.rotation.x += c.userData.rx;
        c.rotation.z += c.userData.rz;
        if (c.position.y < -13) {
          c.position.y = 16 + Math.random() * 4;
          c.position.x = (Math.random() - 0.5) * 32;
        }
      });

      // Hearts
      hearts.forEach((h) => {
        h.position.y += h.userData.vy;
        h.position.x += Math.sin(t * h.userData.swayF + h.userData.phase) * 0.005;
        h.rotation.z  = Math.sin(t * 0.9 + h.userData.phase) * 0.18;
        h.scale.setScalar(0.85 + Math.sin(t * 1.8 + h.userData.phase) * 0.15);
        if (h.position.y > 13) {
          h.position.y = -12;
          h.position.x = (Math.random() - 0.5) * 24;
        }
      });

      // Sparkles twinkle
      sparkles.forEach((s) => {
        s.scale.setScalar(0.4 + 0.6 * Math.abs(Math.sin(t * s.userData.speed + s.userData.phase)));
        s.rotation.z = t * s.userData.speed * 0.5;
      });

      // Camera parallax
      camera.position.x += (mx * 1.2 - camera.position.x) * 0.03;
      camera.position.y += (-my * 0.7 - camera.position.y) * 0.03;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    tick();

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
